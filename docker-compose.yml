services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: access_graph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a local .env file}
    ports:
      - "5432:5432"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d access_graph"]
      interval: 5s
      timeout: 5s
      retries: 10
